# Model configuration for Mortgage AI.
#
# Hot-reloaded per conversation via mtime check -- no restart required.
#
# The 'vision' tier is optional. When VISION_MODEL / VISION_BASE_URL are
# unset or empty, vision calls fall back to the main 'llm' tier.

routing:
  default_tier: llm

models:
  llm:
    provider: openai_compatible
    model_name: "${LLM_MODEL:-gpt-4o-mini}"
    description: "Primary LLM for all agent interactions and tool use"
    endpoint: "${LLM_BASE_URL:-https://api.openai.com/v1}"
    api_key: "${LLM_API_KEY:-not-needed}"
  vision:
    provider: openai_compatible
    model_name: "${VISION_MODEL:-${LLM_MODEL:-gpt-4o-mini}}"
    description: "Vision-capable model for document image extraction"
    endpoint: "${VISION_BASE_URL:-${LLM_BASE_URL:-https://api.openai.com/v1}}"
    api_key: "${VISION_API_KEY:-${LLM_API_KEY:-not-needed}}"
  embedding:
    provider: "${EMBEDDING_PROVIDER:-local}"
    model_name: "${EMBEDDING_MODEL:-nomic-ai/nomic-embed-text-v1.5}"
    description: "Embedding model for compliance KB vector search"
    # Used only when provider=openai_compatible. Set EMBEDDING_BASE_URL to
    # override; falls back to LLM_BASE_URL if unset.
    endpoint: "${EMBEDDING_BASE_URL:-https://api.openai.com/v1}"
    api_key: "${EMBEDDING_API_KEY:-not-needed}"
    dimensions: 768
