apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  annotations:
    opendatahub.io/apiProtocol: REST
    opendatahub.io/recommended-accelerators: '["cpu"]'
    opendatahub.io/template-display-name: vLLM CPU ServingRuntime for KServe
    opendatahub.io/template-name: vllm-xeon-runtime
    openshift.io/display-name: qwen3-8b-cpu
  name: qwen3-8b-cpu
  labels:
    opendatahub.io/dashboard: 'true'
spec:
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: '8080'
  containers:
    - args:
        - '--port=8080'
        - '--model=/mnt/models'
        - '--served-model-name={{.Name}}'
        - '--block-size=128'
        - '--dtype=bfloat16'
        - '--max-model-len=8192'
        - '--distributed-executor-backend=mp'
        - '--max-num-batched-tokens=4096'
        - '--max-num-seqs=128'
        - '--tensor-parallel-size=1'
        - '--pipeline-parallel-size=1'
        - '--enable-auto-tool-choice'
        - '--tool-call-parser=hermes'
      command:
        - vllm
        - serve
      env:
        - name: OMP_NUM_THREADS
          value: "16"
        - name: VLLM_CPU_OMP_THREADS_BIND
          value: "0-15"
        - name: VLLM_LOGGING_LEVEL
          value: "INFO"
      image: 'quay.io/vllm/automation-vllm:cpu-24724916834'
      name: kserve-container
      ports:
        - containerPort: 8080
          protocol: TCP
      volumeMounts:
        - mountPath: /dev/shm
          name: shm
  multiModel: false
  supportedModelFormats:
    - autoSelect: true
      name: vLLM
  volumes:
    - emptyDir:
        medium: Memory
        sizeLimit: 16Gi
      name: shm
