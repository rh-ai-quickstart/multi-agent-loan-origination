{{- if .Values.langfuse.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  labels:
    {{- include "summit-cap.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  serviceName: redis
  selector:
    matchLabels:
      {{- include "summit-cap.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "summit-cap.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      serviceAccountName: {{ include "summit-cap.serviceAccountName" . }}
      containers:
        - name: redis
          image: docker.io/redis:7-alpine
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command:
            - redis-server
            - --requirepass
            - $(REDIS_AUTH)
            - --maxmemory-policy
            - noeviction
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          env:
            - name: REDIS_AUTH
              valueFrom:
                secretKeyRef:
                  name: {{ include "summit-cap.fullname" . }}-secret
                  key: REDIS_AUTH
          livenessProbe:
            exec:
              command:
                - redis-cli
                - -a
                - $(REDIS_AUTH)
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - -a
                - $(REDIS_AUTH)
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    {{- include "summit-cap.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 6379
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    {{- include "summit-cap.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
{{- end }}
