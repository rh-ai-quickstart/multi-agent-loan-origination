apiVersion: v1
kind: Service
metadata:
  name: langfuse-web
  labels:
    {{- include "summit-cap.labels" . | nindent 4 }}
    app.kubernetes.io/component: langfuse-web
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "summit-cap.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: langfuse-web
{{- end }}
