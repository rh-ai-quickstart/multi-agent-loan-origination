{{- if .Values.langfuse.enabled }}
{{- $secretName := printf "%s-secret" (include "summit-cap.fullname" .) }}
{{- $dbName := .Values.database.name }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-web
  labels:
    {{- include "summit-cap.labels" . | nindent 4 }}
    app.kubernetes.io/component: langfuse-web
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "summit-cap.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: langfuse-web
  template:
    metadata:
      labels:
        {{- include "summit-cap.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: langfuse-web
    spec:
      serviceAccountName: {{ include "summit-cap.serviceAccountName" . }}
      initContainers:
        - name: wait-for-deps
          image: postgres:16-alpine
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for postgres..."
              until pg_isready -h {{ $dbName }} -U "$POSTGRES_USER"; do sleep 3; done
              echo "Dependencies ready!"
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: POSTGRES_PASSWORD
      containers:
        - name: langfuse-web
          image: "{{ .Values.langfuse.web.image.repository }}:{{ .Values.langfuse.web.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.secrets.POSTGRES_USER }}:{{ .Values.secrets.POSTGRES_PASSWORD }}@{{ $dbName }}:5432/langfuse"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: NEXTAUTH_URL
              value: "http://langfuse-web:3000"
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: NEXTAUTH_SECRET
            - name: SALT
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: LANGFUSE_SALT
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: LANGFUSE_ENCRYPTION_KEY
            - name: TELEMETRY_ENABLED
              value: "false"
            - name: LANGFUSE_INIT_ORG_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: LANGFUSE_INIT_ORG_ID
            - name: LANGFUSE_INIT_ORG_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: LANGFUSE_INIT_ORG_NAME
            - name: LANGFUSE_INIT_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: LANGFUSE_INIT_PROJECT_ID
            - name: LANGFUSE_INIT_PROJECT_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: LANGFUSE_INIT_PROJECT_NAME
            - name: LANGFUSE_INIT_PROJECT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: LANGFUSE_INIT_PROJECT_PUBLIC_KEY
            - name: LANGFUSE_INIT_PROJECT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: LANGFUSE_INIT_PROJECT_SECRET_KEY
            - name: LANGFUSE_INIT_USER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: LANGFUSE_INIT_USER_EMAIL
            - name: LANGFUSE_INIT_USER_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: LANGFUSE_INIT_USER_NAME
            - name: LANGFUSE_INIT_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: LANGFUSE_INIT_USER_PASSWORD
            - name: CLICKHOUSE_MIGRATION_URL
              value: "clickhouse://clickhouse:{{ .Values.secrets.CLICKHOUSE_PASSWORD }}@clickhouse:9000/default"
            - name: CLICKHOUSE_URL
              value: "http://clickhouse:8123"
            - name: CLICKHOUSE_USER
              value: clickhouse
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: CLICKHOUSE_PASSWORD
            - name: CLICKHOUSE_CLUSTER_ENABLED
              value: "false"
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_AUTH
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: REDIS_AUTH
            - name: LANGFUSE_S3_EVENT_UPLOAD_BUCKET
              value: langfuse
            - name: LANGFUSE_S3_EVENT_UPLOAD_REGION
              value: us-east-1
            - name: LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: MINIO_ROOT_USER
            - name: LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: MINIO_ROOT_PASSWORD
            - name: LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT
              value: "http://{{ .Values.minio.name }}:9000"
            - name: LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE
              value: "true"
            - name: LANGFUSE_S3_MEDIA_UPLOAD_BUCKET
              value: langfuse
            - name: LANGFUSE_S3_MEDIA_UPLOAD_REGION
              value: us-east-1
            - name: LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: MINIO_ROOT_USER
            - name: LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: MINIO_ROOT_PASSWORD
            - name: LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT
              value: "http://{{ .Values.minio.name }}:9000"
            - name: LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE
              value: "true"
          livenessProbe:
            httpGet:
              path: /api/public/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /api/public/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          resources:
            {{- toYaml .Values.langfuse.web.resources | nindent 12 }}
---
