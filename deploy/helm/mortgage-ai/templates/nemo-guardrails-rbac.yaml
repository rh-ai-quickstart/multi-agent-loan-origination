{{- if .Values.nemoGuardrails.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nemo-guardrails-api
  labels:
    {{- include "mortgage-ai.nemo-guardrails.labels" . | nindent 4 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: nemo-guardrails-api-token
  annotations:
    kubernetes.io/service-account.name: nemo-guardrails-api
  labels:
    {{- include "mortgage-ai.nemo-guardrails.labels" . | nindent 4 }}
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nemo-guardrails-api-access
  labels:
    {{- include "mortgage-ai.nemo-guardrails.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nemo-guardrails-api-access
  labels:
    {{- include "mortgage-ai.nemo-guardrails.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nemo-guardrails-api-access
subjects:
  - kind: ServiceAccount
    name: nemo-guardrails-api
    namespace: {{ .Release.Namespace }}
{{- end }}
