{{- if .Values.nemoGuardrails.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: nemo-guardrails-config
  labels:
    {{- include "mortgage-ai.nemo-guardrails.labels" . | nindent 4 }}
data:
  config.yaml: |
    models:
      - type: main
        engine: openai
        parameters:
          {{- if .Values.nemoGuardrails.proxy.enabled }}
          openai_api_base: "http://nemo-guardrails-proxy:8081/v1"
          {{- else }}
          openai_api_base: {{ .Values.nemoGuardrails.llm.baseUrl | quote }}
          {{- end }}
          model_name: {{ .Values.nemoGuardrails.llm.modelName | quote }}
          model: {{ .Values.nemoGuardrails.llm.modelName | quote }}
      {{- if .Values.nemoGuardrails.contentSafety.deploy }}
      - type: "content_safety"
        engine: nim
        parameters:
          {{- if .Values.nemoGuardrails.proxy.enabled }}
          base_url: "http://nemo-guardrails-proxy:8085/v1"
          {{- else }}
          base_url: "http://content-safety-detector-predictor:8080/v1"
          {{- end }}
          model_name: "content-safety-detector"
      {{- end }}
    rails:
      config:
        sensitive_data_detection:
          input:
            entities:
              - EMAIL_ADDRESS
          output:
            entities:
              - PERSON
      input:
        flows:
          - detect sensitive data on input
          - check forbidden words
          {{- if .Values.nemoGuardrails.contentSafety.deploy }}
          - content safety check input $model=content_safety
          {{- end }}
      output:
        flows:
          - detect sensitive data on output
          {{- if .Values.nemoGuardrails.contentSafety.deploy }}
          - content safety check output $model=content_safety
          {{- end }}

    {{- if .Values.nemoGuardrails.contentSafety.deploy }}
    prompts:
      - task: content_safety_check_input $model=content_safety
        content: |
            Task: Check if there is unsafe content in the user or agent messages in the below conversation in accordance with our safety policy with the below categories. Provide a 'safe' or 'unsafe' rating for both the user message and the agent response. If there is unsafe content, please also provide a list of violated categories according to our safety policy below.

            <BEGIN UNSAFE CONTENT CATEGORIES>
            S1: Violence.
            S2: Sexual.
            S3: Criminal Planning/Confessions.
            S4: Guns and Illegal Weapons.
            S5: Controlled/Regulated Substances.
            S6: Suicide and Self Harm.
            S7: Sexual (minor).
            S8: Hate/Identity Hate.
            S9: PII/Privacy.
            S10: Harassment.
            S11: Threat.
            S12: Profanity.
            S13: Needs Caution.
            S14: Other.
            S15: Manipulation.
            S16: Fraud/Deception.
            S17: Malware.
            S18: High Risk Gov Decision Making.
            S19: Political/Misinformation/Conspiracy.
            S20: Copyright/Trademark/Plagiarism.
            S21: Unauthorized Advice.
            S22: Illegal Activity.
            S23: Immoral/Unethical.
            <END UNSAFE CONTENT CATEGORIES>

            <BEGIN CONVERSATION>

            user: {{ "{{" }} user_input {{ "}}" }}

            <END CONVERSATION>

            Provide your safety assessment for the above conversation in the below output JSON format:
            {"User Safety": safe or unsafe rating for the user message, "Response Safety": safe or unsafe rating for the agent response. Omit if no agent response present. "Safety Categories": a comma-separated list of applicable safety categories from the provided taxonomy. Omit if all safe.}

            Do not include anything other than the output JSON in your response.
            Output JSON:
        output_parser: nemoguard_parse_prompt_safety
        max_tokens: 50
      - task: content_safety_check_output $model=content_safety
        content: |
            Task: Check if there is unsafe content in the user or agent messages in the below conversation in accordance with our safety policy with the below categories. Provide a 'safe' or 'unsafe' rating for both the user message and the agent response. If there is unsafe content, please also provide a list of violated categories according to our safety policy below.

            <BEGIN UNSAFE CONTENT CATEGORIES>
            S1: Violence.
            S2: Sexual.
            S3: Criminal Planning/Confessions.
            S4: Guns and Illegal Weapons.
            S5: Controlled/Regulated Substances.
            S6: Suicide and Self Harm.
            S7: Sexual (minor).
            S8: Hate/Identity Hate.
            S9: PII/Privacy.
            S10: Harassment.
            S11: Threat.
            S12: Profanity.
            S13: Needs Caution.
            S14: Other.
            S15: Manipulation.
            S16: Fraud/Deception.
            S17: Malware.
            S18: High Risk Gov Decision Making.
            S19: Political/Misinformation/Conspiracy.
            S20: Copyright/Trademark/Plagiarism.
            S21: Unauthorized Advice.
            S22: Illegal Activity.
            S23: Immoral/Unethical.
            <END UNSAFE CONTENT CATEGORIES>

            <BEGIN CONVERSATION>

            user: {{ "{{" }} user_input {{ "}}" }}

            response: agent: {{ "{{" }} bot_response {{ "}}" }}

            <END CONVERSATION>

            Provide your safety assessment for the above conversation in the below output JSON format:
            {"User Safety": safe or unsafe rating for the user message, "Response Safety": safe or unsafe rating for the agent response. Omit if no agent response present. "Safety Categories": a comma-separated list of applicable safety categories from the provided taxonomy. Omit if all safe.}

            Do not include anything other than the output JSON in your response.
            Output JSON:
        output_parser: nemoguard_parse_response_safety
        max_tokens: 50
    {{- end }}

  rails.co: |
    define flow check forbidden words
      $forbidden_result = execute check_forbidden_words
      if $forbidden_result != "allowed"
        bot inform forbidden content
        stop

    define bot inform forbidden content
      "I can't help with that type of request. Please ask something else."

  actions.py: |
    from typing import Optional
    from nemoguardrails.actions import action

    @action(is_system_action=True)
    async def check_forbidden_words(context: Optional[dict] = None) -> str:
        """Check for forbidden words or topics."""
        user_message = context.get("user_message", "").lower()
        forbidden_topics = {
            "security": ["password", "hack", "exploit", "vulnerability"],
            "inappropriate": ["violence", "illegal", "harmful"],
            "competitors": ["chatgpt", "openai", "claude", "anthropic"],
        }
        for category, words in forbidden_topics.items():
            for word in words:
                if word in user_message:
                    return f"blocked_{category}_{word}"
        return "allowed"
{{- end }}
