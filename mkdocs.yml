# This project was developed with assistance from AI tools.
#
# MkDocs configuration for Mortgage AI documentation.
# Build locally: mkdocs serve
# Deploy:        GitHub Actions (.github/workflows/docs.yml)

site_name: Mortgage AI
site_description: Multi-Agent Loan Origination - Red Hat AI Quickstart
repo_url: https://github.com/rh-ai-quickstart/multi-agent-loan-origination
repo_name: rh-ai-quickstart/multi-agent-loan-origination
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

# Navigation structure -- agents will populate pages under each section.
# Add new pages here as they are created.
nav:
  - Home: index.md
  - Architecture: architecture.md
  - Personas & Workflows: personas.md
  - API Reference: api-reference.md
